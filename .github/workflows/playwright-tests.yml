name: Playwright Tests

# Trigger on pull requests targeting main, and on direct pushes to main (for Pages deploy)
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# Cancel in-progress runs for the same PR to avoid wasted compute
concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal read-only permissions
permissions:
  contents: read

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    # Playwright image: browsers + all system deps pre-installed, no apt-get needed
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    timeout-minutes: 15
    environment: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write

    env:
      CI: true
      BASE_URL: ${{ secrets.BASE_URL }}
      PW_RETRIES: 2
      PW_TEST_TIMEOUT_MS: 30000
      PW_EXPECT_TIMEOUT_MS: 5000
      PW_HEADLESS: true
      PW_WORKERS: 3

    steps:
      # Check out the repository code (shallow clone — no history needed)
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      # Cache yarn dependencies
      - name: Cache yarn dependencies
        uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.yarn/cache
            node_modules
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-

      # Install dependencies using the frozen lockfile
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache

      # Run all Playwright tests in parallel
      - name: Run Playwright tests
        run: yarn playwright test

      # Upload HTML report for review (always, even on failure)
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: playwright-html-report
          path: playwright-report
          retention-days: 30

      # Upload traces for debugging failed tests (always)
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip
          retention-days: 30

      # Notify Microsoft Teams on failure
      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "type": "message",
              "attachments": [
                {
                  "contentType": "application/vnd.microsoft.card.adaptive",
                  "content": {
                    "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                    "type": "AdaptiveCard",
                    "version": "1.4",
                    "body": [
                      {
                        "type": "TextBlock",
                        "text": "❌ Playwright Tests Failed",
                        "weight": "Bolder",
                        "size": "Large",
                        "color": "Attention"
                      },
                      {
                        "type": "FactSet",
                        "facts": [
                          { "title": "PR", "value": "${{ github.event.pull_request.title }}" },
                          { "title": "Author", "value": "${{ github.event.pull_request.user.login }}" },
                          { "title": "Branch", "value": "${{ github.head_ref }}" }
                        ]
                      },
                      {
                        "type": "ActionSet",
                        "actions": [
                          {
                            "type": "Action.OpenUrl",
                            "title": "View failed run",
                            "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                          }
                        ]
                      }
                    ]
                  }
                }
              ]
            }'

      # Fetch previous run history from gh-pages branch (non-blocking if branch absent)
      - name: Fetch gh-pages history
        if: always() && github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/checkout@v6.0.2
        with:
          ref: gh-pages
          path: .gh-pages-tmp
          fetch-depth: 1

      # Append current run entry to history.json and write it into playwright-report/
      - name: Update history.json
        if: always() && github.ref == 'refs/heads/main'
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const prevFile = '.gh-pages-tmp/history.json';
          const outFile  = 'playwright-report/history.json';

          let history = [];
          try { history = JSON.parse(fs.readFileSync(prevFile, 'utf8')); } catch {}
          if (!Array.isArray(history)) history = [];

          history.push({
            timestamp:  new Date().toISOString(),
            runUrl:     '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',
            commitSha:  '${{ github.sha }}',
            ref:        '${{ github.ref }}',
            branch:     '${{ github.ref_name }}',
            conclusion: '${{ job.status }}'
          });

          if (history.length > 100) history = history.slice(-100);

          fs.mkdirSync('playwright-report', { recursive: true });
          fs.writeFileSync(outFile, JSON.stringify(history, null, 2));
          console.log(`History updated — ${history.length} entries.`);
          EOF

      # Package playwright-report/ as a GitHub Pages artifact
      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      # Publish to GitHub Pages
      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    continue-on-error: false
    timeout-minutes: 10

    steps:
      # Check out the repository code (shallow clone — no history needed)
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      # Set up Node.js LTS with Yarn cache
      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: lts/*
          cache: yarn

      # Install dependencies using the frozen lockfile
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache

      # Run yarn audit and write summary; fail on high/critical
      - name: Run dependency vulnerability scan
        run: |
          echo "## 🔐 Dependency Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Capture audit output (yarn audit exits non-zero when vulnerabilities found)
          AUDIT_OUTPUT=$(yarn audit --level high --json 2>&1 || true)

          # Count vulnerabilities by severity
          HIGH=$(echo "$AUDIT_OUTPUT" | grep -c '"severity":"high"' || true)
          CRITICAL=$(echo "$AUDIT_OUTPUT" | grep -c '"severity":"critical"' || true)
          TOTAL=$((HIGH + CRITICAL))

          if [ "$TOTAL" -gt 0 ]; then
            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔴 Critical | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟠 High     | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ❌ **$TOTAL high/critical vulnerabilities found. Blocking PR.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "> ✅ **No high or critical vulnerabilities found.**" >> $GITHUB_STEP_SUMMARY
          fi
