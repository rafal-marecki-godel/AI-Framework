name: Playwright Tests

# Trigger only on pull requests targeting main
on:
  pull_request:
    branches: [ main ]

# Cancel in-progress runs for the same PR to avoid wasted compute
concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal read-only permissions
permissions:
  contents: read

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      BASE_URL: https://demoqa.com
      PW_RETRIES: 2
      PW_TEST_TIMEOUT_MS: 30000
      PW_EXPECT_TIMEOUT_MS: 5000
      PW_HEADLESS: true
      PW_WORKERS: 3

    steps:
      # Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js LTS with Yarn cache
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # Install dependencies using the frozen lockfile
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # Install Playwright browsers and system-level dependencies
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # Run all Playwright tests in parallel
      - name: Run Playwright tests
        run: yarn playwright test

      # Upload HTML report for review (always, even on failure)
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          retention-days: 30

      # Upload traces for debugging failed tests (always)
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip
          retention-days: 30
